name: "Podcast Feed Generator"
author: "Akila Wasalathilaka"
description: "A GitHub Action to generate a podcast feed from a list of episodes."

runs:
  using: "docker"
  image: "DockerFile"

branding:
  icon: "git-branch"
  color: "red"

inputs:
  email:
    description: "The email address of the podcast creator."
    required: true
    default: "${{ github.actor }}@localhost"

  name:
    description: "The committer's name."
    required: true
    default: "${{ github.actor }}"